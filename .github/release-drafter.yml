name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES

  ## Docker

  - `ghcr.io/$OWNER/$REPOSITORY:latest`
  - `ghcr.io/$OWNER/$REPOSITORY:v$RESOLVED_VERSION`

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Fixes
    labels:
      - fix
      - bug
      - bugfix
  - title: Documentation
    labels:
      - documentation
      - docs
  - title: Maintenance
    labels:
      - chore
      - dependencies
      - ci

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bug
      - bugfix
      - documentation
      - docs
      - chore
      - dependencies
      - ci
  default: patch
exclude-labels:
  - skip-changelog
template-footer: |
  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
